# Local dev stack. Per docs/bip-deck-platform-deployment.md §6.
# Production overlay (docker-compose.prod.yml) and nginx come later.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bip
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: bip_deck_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bip"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: dev
    env_file: .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - ./deck-repos:/var/bip/deck-repos
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      target: dev
    env_file: .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - ./deck-repos:/var/bip/deck-repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:
